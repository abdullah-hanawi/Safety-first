<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety First | مصاعد المقاولات والمشاريع الصناعية</title>
    <style>
        /* --- الألوان والهوية البصرية --- */
        :root {
            --primary-burgundy: #6b151e; /* النبيتي الفخم */
            --dark-burgundy: #4a0d13;    /* نبيتي داكن */
            --cream-bg: #fdfbf7;         /* اللون السكري للخلفية */
            --white: #ffffff;
            --text-dark: #2b2b2b;
            --text-light: #666666;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- التنسيقات العامة --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--cream-bg);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }

        /* --- الهيدر المطوّر (شريط التنقل) --- */
        header {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px); /* تأثير زجاجي عصري */
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary-burgundy);
            text-decoration: none;
            letter-spacing: 0.5px;
        }

        /* التنسيق الافتراضي للشاشات الكبيرة (الكمبيوتر) */
        .nav-menu {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 16px;
            position: relative;
            transition: var(--transition);
        }

        /* أنيميشن خط تحت الرابط عند مرور الماوس */
        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            right: 0;
            background-color: var(--primary-burgundy);
            transition: var(--transition);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: var(--primary-burgundy);
        }

        .btn-header {
            background-color: var(--primary-burgundy);
            color: var(--white);
            padding: 10px 22px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
            transition: var(--transition);
            box-shadow: 0 4px 10px rgba(107, 21, 30, 0.2);
        }

        .btn-header:hover {
            background-color: var(--dark-burgundy);
            transform: translateY(-2px);
        }

        /* زر الهامبرغر (☰) للموبايل - مخفي افتراضياً على الكمبيوتر */
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            border: none;
            background: none;
            padding: 5px;
            z-index: 1001;
        }

        .menu-toggle span {
            display: block;
            width: 28px;
            height: 3px;
            background-color: var(--primary-burgundy);
            border-radius: 2px;
            transition: var(--transition);
        }

        /* --- القسم الرئيسي (Hero Section) --- */
        .hero {
            background: linear-gradient(135deg, rgba(107, 21, 30, 0.92) 0%, rgba(74, 13, 19, 0.96) 100%), 
                        url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?q=80&w=1200') no-repeat center center/cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            color: var(--white);
            text-align: center;
            padding: 120px 0 60px 0;
        }

        .hero-content h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            font-weight: 800;
            line-height: 1.3;
        }

        .hero-content p {
            font-size: 1.2rem;
            margin-bottom: 35px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            color: #f0e6e6;
        }

        .btn-hero {
            background-color: var(--cream-bg);
            color: var(--primary-burgundy);
            padding: 14px 35px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: inline-block;
        }

        .btn-hero:hover {
            background-color: var(--white);
            transform: translateY(-3px);
        }

        /* --- قسم المميزات --- */
        .features {
            padding: 80px 0;
            background-color: var(--white);
        }

        .section-title {
            text-align: center;
            font-size: 32px;
            color: var(--primary-burgundy);
            margin-bottom: 10px;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background-color: var(--primary-burgundy);
            margin: 8px auto 0;
        }

        .section-subtitle {
            text-align: center;
            color: var(--text-light);
            margin-bottom: 50px;
            font-size: 17px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .feature-card {
            background-color: var(--cream-bg);
            padding: 45px 25px;
            border-radius: 8px;
            border-top: 5px solid var(--primary-burgundy);
            transition: var(--transition);
            text-align: center;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.06);
        }

        .feature-icon {
            font-size: 40px;
            color: var(--primary-burgundy);
            margin-bottom: 15px;
        }

        .feature-card h3 {
            margin-bottom: 12px;
            font-size: 22px;
        }

        /* --- قسم شركاء النجاح --- */
        .targets {
            padding: 80px 0;
        }

        .targets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .target-card {
            background: var(--white);
            border: 1px solid #f1eeeb;
            border-radius: 8px;
            transition: var(--transition);
        }

        .target-card:hover {
            box-shadow: 0 10px 25px rgba(107, 21, 30, 0.08);
        }

        .target-info {
            padding: 30px;
        }

        .target-info h3 {
            color: var(--primary-burgundy);
            margin-bottom: 12px;
            font-size: 20px;
        }

        /* --- قسم الاستمارة --- */
        .contact-section {
            padding: 80px 0;
            background-color: var(--white);
        }

        .form-wrapper {
            max-width: 650px;
            margin: 0 auto;
            background-color: var(--cream-bg);
            padding: 40px 30px;
            border-radius: 10px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.04);
            border-right: 6px solid var(--primary-burgundy);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 15px;
        }

        .form-group input, 
        .form-group select, 
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
            background-color: var(--white);
            color: var(--text-dark);
            outline: none;
            transition: var(--transition);
        }

        .form-group input:focus, 
        .form-group select:focus, 
        .form-group textarea:focus {
            border-color: var(--primary-burgundy);
            box-shadow: 0 0 5px rgba(107, 21, 30, 0.2);
        }

        .btn-submit {
            background-color: var(--primary-burgundy);
            color: var(--white);
            border: none;
            padding: 14px;
            font-size: 17px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            transition: var(--transition);
        }

        .btn-submit:hover {
            background-color: var(--dark-burgundy);
        }

        .success-message {
            display: none;
            background-color: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* --- الفوتر --- */
        footer {
            background-color: var(--dark-burgundy);
            color: var(--white);
            text-align: center;
            padding: 30px 0;
            font-size: 14px;
        }

        /* =======================================================
           تنسيقات شاشات الهواتف والتابلت (تحويل الهيدر إلى قائمة منزلقة)
           ======================================================= */
        @media (max-width: 992px) {
            .menu-toggle {
                display: flex; /* إظهار زر القائمة (☰) في الهاتف */
            }

            /* تحويل القائمة إلى لوحة منزلقة من الأعلى بكامل الشاشة */
            .nav-menu {
                position: fixed;
                top: 0;
                right: -100%; /* تكون مخفية تماماً خارج الشاشة من اليمين */
                width: 75%;
                max-width: 300px;
                height: 100vh;
                background-color: var(--white);
                box-shadow: -5px 0 25px rgba(0,0,0,0.15);
                flex-direction: column;
                align-items: flex-start;
                padding: 100px 40px 40px 40px;
                gap: 40px;
                transition: var(--transition);
            }

            /* فئة يتم إضافتها عبر الجافا سكريبت لفتح القائمة */
            .nav-menu.active {
                right: 0; /* تتحرك لتظهر داخل الشاشة بسلاسة */
            }

            .nav-links {
                flex-direction: column;
                gap: 25px;
                width: 100%;
            }

            .nav-links a {
                font-size: 18px;
                display: block;
                width: 100%;
            }

            .btn-header {
                width: 100%;
                text-align: center;
                padding: 12px;
            }

            /* تحريك شرطات زر الهامبرغر ليتحول إلى علامة (X) عند فتح القائمة */
            .menu-toggle.active span:nth-child(1) {
                transform: translateY(9px) rotate(45deg);
            }
            .menu-toggle.active span:nth-child(2) {
                opacity: 0;
            }
            .menu-toggle.active span:nth-child(3) {
                transform: translateY(-9px) rotate(-45deg);
            }

            /* ضبط أحجام قسم الهيرو للموبايل */
            .hero-content h1 {
                font-size: 2rem;
            }
            .hero-content p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
